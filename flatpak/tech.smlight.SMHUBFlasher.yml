app-id: tech.smlight.SMHUBFlasher
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: smhub-flasher-gui
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=all
  - --device=dri
  - --filesystem=host

build-options:
  build-args:
    - --share=network

modules:
  - name: fastboot
    buildsystem: simple
    build-commands:
      - install -D -m755 fastboot-linux-x86_64 /app/bin/fastboot
    sources:
      # Pre-built fastboot binary from tl-sl/android-tools CI
      # Source: https://github.com/tl-sl/android-tools (Apache 2.0, built from nmeum/android-tools 35.0.2)
      - type: file
        url: https://github.com/tl-sl/android-tools/releases/download/35.0.2/fastboot-linux-x86_64
        sha256: 2a09cfd9b77b61f112409e1b35a1b315bcd5d396e7abdad79c169601a5a66b77
        dest-filename: fastboot-linux-x86_64

  - name: lrzsz
    buildsystem: autotools
    build-options:
      cflags: "-std=gnu89 -Wno-implicit-function-declaration -Wno-int-conversion -Wno-implicit-int -Wno-incompatible-pointer-types"
    post-install:
      - ln -sf lrz /app/bin/rz
      - ln -sf lsz /app/bin/sz
      - rm -f /app/bin/lrx /app/bin/lrb /app/bin/lsx /app/bin/lsb
    sources:
      - type: archive
        url: https://ohse.de/uwe/releases/lrzsz-0.12.20.tar.gz
        sha256: c28b36b14bddb014d9e9c97c52459852f97bd405f89113f30bee45ed92728ff1

  - name: smhub-flasher-gui
    buildsystem: simple
    build-commands:
      # Install Desktop & Metainfo files
      - install -D -m644 tech.smlight.SMHUBFlasher.desktop /app/share/applications/tech.smlight.SMHUBFlasher.desktop
      - install -D -m644 tech.smlight.SMHUBFlasher.metainfo.xml /app/share/metainfo/tech.smlight.SMHUBFlasher.metainfo.xml
      - install -D -m644 png/icon.png /app/share/icons/hicolor/256x256/apps/tech.smlight.SMHUBFlasher.png
      - install -D -m644 png/icon@2x.png /app/share/icons/hicolor/512x512/apps/tech.smlight.SMHUBFlasher.png
      # Install CLI and GUI package and dependencies
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.9.3 pip3 install --prefix=/app --ignore-installed .
      - pip3 install --prefix=/app --ignore-installed pywebview PyGObject pyserial
      - mkdir -p /app/share/smhub-flasher-gui
      - cp gui/app.py gui/flasher_runner.py gui/driver_check.py gui/console.py /app/share/smhub-flasher-gui/
      - cp -r gui/web /app/share/smhub-flasher-gui/web
      # Install launcher
      - install -D -m755 run.sh /app/bin/smhub-flasher-gui
    sources:
      - type: file
        path: tech.smlight.SMHUBFlasher.desktop
      - type: file
        path: tech.smlight.SMHUBFlasher.metainfo.xml
      - type: dir
        path: .
      - type: file
        path: run.sh
