app-id: tech.smlight.SMHUBFlasher
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: smhub-flasher-gui
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=all
  - --device=dri
  - --filesystem=host

build-options:
  build-args:
    - --share=network

modules:
  - name: smhub-flasher-gui
    buildsystem: simple
    build-commands:
      # Install fastboot
      - install -D -m755 platform-tools/fastboot /app/bin/fastboot
      # Install Desktop & Metainfo files
      - install -D -m644 tech.smlight.SMHUBFlasher.desktop /app/share/applications/tech.smlight.SMHUBFlasher.desktop
      - install -D -m644 tech.smlight.SMHUBFlasher.metainfo.xml /app/share/metainfo/tech.smlight.SMHUBFlasher.metainfo.xml
      - install -D -m644 png/icon.png /app/share/icons/hicolor/256x256/apps/tech.smlight.SMHUBFlasher.png
      - install -D -m644 png/icon@2x.png /app/share/icons/hicolor/512x512/apps/tech.smlight.SMHUBFlasher.png
      # Install CLI and GUI package and dependencies
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.9.3 pip3 install --prefix=/app --ignore-installed .
      - pip3 install --prefix=/app --ignore-installed pywebview PyGObject
      - mkdir -p /app/share/smhub-flasher-gui
      - cp gui/app.py gui/flasher_runner.py gui/driver_check.py /app/share/smhub-flasher-gui/
      - cp -r gui/web /app/share/smhub-flasher-gui/web
      # Install launcher
      - install -D -m755 run.sh /app/bin/smhub-flasher-gui
    sources:
      - type: archive
        url: https://dl.google.com/android/repository/platform-tools_r35.0.1-linux.zip
        sha256: 823d270be01444828ccd09e94209ff394fb8a8457243e1c15689fe0544acbc72
        strip-components: 0
      - type: file
        path: tech.smlight.SMHUBFlasher.desktop
      - type: file
        path: tech.smlight.SMHUBFlasher.metainfo.xml
      - type: dir
        path: .
      - type: file
        path: run.sh
