name: Lint Backend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.5"
      - run: uv sync --all-groups
      - run: uvx prek run --all-files
  test:
    runs-on: ubuntu-latest
    if: false # Skip tests - non written yet
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.5"
      - run: uv sync --all-groups
      - run: uv run pytest tests/ -v
